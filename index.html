<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Optimized Reaction Test</title>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#111;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial,sans-serif;
}

#box{
    width:420px;
    height:260px;
    border-radius:12px;
    background:#555;
    cursor:pointer;
    user-select:none;

    /* optimization */
    will-change:background;
    transform:translateZ(0);
}

.waiting{
    background:#8b0000 !important;
}

.ready{
    background:#00c853 !important;
}
</style>
</head>

<body>

<div id="box"></div>

<script>
const box = document.getElementById("box");

let waiting = false;
let ready = false;
let startTime = 0;
let timeout = 0;

function startTest(){

    waiting = true;
    ready = false;

    box.className = "waiting";

    timeout = setTimeout(() => {

        requestAnimationFrame(() => {

            box.className = "ready";

            requestAnimationFrame(() => {
                startTime = performance.now();
                ready = true;
                waiting = false;
            });

        });

    }, Math.random() * 2000 + 500);
}

box.onpointerdown = () => {

    // start
    if(!waiting && !ready){
        startTest();
        return;
    }

    // early click
    if(waiting){
        clearTimeout(timeout);

        waiting = false;

        box.className = "";

        return;
    }

    // successful click
    if(ready){

        const reaction = performance.now() - startTime;

        ready = false;

        box.className = "";

        console.log(
            "Reaction:",
            reaction.toFixed(2),
            "ms"
        );

        alert(reaction.toFixed(0) + " ms");
    }
};
</script>

</body>
</html>
